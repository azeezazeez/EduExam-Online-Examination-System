<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Online Examination</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            font-family: "Segoe UI", sans-serif;
        }
        .login-box {
            background: #ffffff;
            width: 360px;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
        }
        .login-box h2 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: bold;
            color: #0d6efd;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ced4da;
            font-size: 14px;
        }
        .login-btn {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background-color: #0d6efd;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .login-btn:hover {
            background-color: #0b5ed7;
        }
        .error-msg {
            color: #dc3545;
            background: #fff5f5;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid #dc3545;
            text-align: center;
        }
        .register-link {
            text-align: center;
            margin-top: 15px;
        }
        .register-link a {
            color: #4e73df;
            font-weight: bold;
            text-decoration: none;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="login-box">
    <h2>Online Examination Login</h2>

    <div class="error-msg" th:if="${error}" th:text="${error}"></div>

    <form th:action="@{/login}" th:object="${loginDTO}" method="post">
        <div class="form-group">
            <label>Username / Email</label>
            <input type="text" th:field="*{usernameOrEmail}" required>
            <div class="text-danger" th:if="${#fields.hasErrors('usernameOrEmail')}"
                 th:errors="*{usernameOrEmail}"></div>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" th:field="*{password}" required>
            <div class="text-danger" th:if="${#fields.hasErrors('password')}"
                 th:errors="*{password}"></div>
        </div>

        <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="register-link">
        <p>New User? <a th:href="@{/register}">Register</a></p>
    </div>
</div>
</body>
</html>
